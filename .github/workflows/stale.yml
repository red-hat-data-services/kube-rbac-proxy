name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  stale:
    name: Stale check
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 180
          days-before-close: 14
          stale-issue-message: >
            This issue has been inactive for 180 days.
            If the issue is still relevant please comment to re-activate it.
            If no action is taken within 14 days, it will be closed.
          stale-pr-message: >
            This pull request has been inactive for 180 days.
            If it is still relevant please comment to re-activate it.
            If no action is taken within 14 days, it will be closed.
          exempt-issue-labels: bug,high-priority
          exempt-pr-labels: bug,high-priority
