ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - '.tekton/**'
          - 'Makefile'

go:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.go'
          - 'go.mod'
          - 'go.sum'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*_test.go'
          - 'test/**'

docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile*'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'LICENSE'

authz:
  - changed-files:
      - any-glob-to-any-file:
          - 'pkg/authz/**'
          - 'pkg/proxy/**'
          - 'pkg/filters/**'
